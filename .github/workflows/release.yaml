name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            arch: amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04
            arch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add "${{ matrix.target }}"

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --locked --target "${{ matrix.target }}"

      - name: Run tests
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: cargo test --locked

      - name: Package binary
        run: |
          cd "target/${{ matrix.target }}/release"
          tar czf "../../../dnsforge-linux-${{ matrix.arch }}.tar.gz" dnsforge
          cd ../../..

      - name: Build .deb
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          PKG=dnsforge_${VERSION}-1_${{ matrix.arch }}
          mkdir -p "$PKG/DEBIAN"
          mkdir -p "$PKG/usr/bin"

          install -Dm755 "target/${{ matrix.target }}/release/dnsforge" "$PKG/usr/bin/dnsforge"

          cat >"$PKG/DEBIAN/control" <<CTRL
          Package: dnsforge
          Version: ${VERSION}-1
          Architecture: ${{ matrix.arch }}
          Maintainer: Roman Kivalin <roman@shl.dev>
          Section: admin
          Priority: optional
          Description: Declarative DNS zone manager with Rhai scripting
           Dnsforge manages DNS zones declaratively using Rhai scripts.
           It fetches current zone state via AXFR, computes a diff, and
           applies changes via RFC 2136 dynamic updates with TSIG.
          CTRL

          dpkg-deb --build --root-owner-group "$PKG"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-linux-${{ matrix.arch }}
          path: |
            dnsforge-linux-${{ matrix.arch }}.tar.gz
            *.deb

  build-macos:
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-15-intel
            arch: amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            arch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal

      - name: Build
        run: cargo build --release --locked --target "${{ matrix.target }}"

      - name: Run tests
        run: cargo test --locked

      - name: Package binary
        run: |
          cd "target/${{ matrix.target }}/release"
          tar czf "../../../dnsforge-macos-${{ matrix.arch }}.tar.gz" dnsforge
          cd ../../..

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-macos-${{ matrix.arch }}
          path: dnsforge-macos-${{ matrix.arch }}.tar.gz

  package-archlinux:
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    steps:
      - uses: actions/checkout@v6

      - name: Build package
        run: |
          pacman -Syu --noconfirm rustup

          useradd -m builder
          chown -R builder:builder .
          su builder -c 'rustup toolchain install stable --profile minimal'
          su builder -c 'makepkg --noconfirm'

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: archlinux-package
          path: "dnsforge-[0-9]*.pkg.tar.zst"

  release:
    needs: [build-linux, build-macos, package-archlinux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Extract changelog
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          sed -n "/^## ${VERSION} /,/^## [0-9]/{/^## [0-9]/d;p}" CHANGELOG.md \
            | awk '
              BEGIN { header=""; body="" }
              /^### / {
                if (header != "" && body != "") printf "%s\n\n%s", header, body
                header = $0; body = ""
                next
              }
              /^- / || /^  / { body = body $0 "\n"; next }
              /^$/ { if (body != "") body = body "\n" }
              END { if (header != "" && body != "") printf "%s\n\n%s", header, body }
            ' | sed -e :a -e '/^\n*$/{$d;N;ba}' \
            >/tmp/release-notes.md

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mkdir release
          cp artifacts/build-linux-amd64/dnsforge-linux-amd64.tar.gz release/
          cp artifacts/build-linux-arm64/dnsforge-linux-arm64.tar.gz release/
          cp artifacts/build-linux-amd64/*.deb release/
          cp artifacts/build-linux-arm64/*.deb release/
          cp artifacts/build-macos-amd64/dnsforge-macos-amd64.tar.gz release/
          cp artifacts/build-macos-arm64/dnsforge-macos-arm64.tar.gz release/
          cp artifacts/archlinux-package/*.pkg.tar.zst release/

          cd release
          sha256sum * >SHA256SUMS
          cd ..

          gh release create "${GITHUB_REF_NAME}" \
            --title "dnsforge ${VERSION}" \
            --notes-file /tmp/release-notes.md \
            release/*

      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          SHA_AMD64=$(sha256sum release/dnsforge-macos-amd64.tar.gz | cut -d' ' -f1)
          SHA_ARM64=$(sha256sum release/dnsforge-macos-arm64.tar.gz | cut -d' ' -f1)
          SHA_LINUX_AMD64=$(sha256sum release/dnsforge-linux-amd64.tar.gz | cut -d' ' -f1)
          SHA_LINUX_ARM64=$(sha256sum release/dnsforge-linux-arm64.tar.gz | cut -d' ' -f1)

          cat >dnsforge.rb <<FORMULA
          class Dnsforge < Formula
            desc "Declarative DNS zone manager with Rhai scripting"
            homepage "https://github.com/rkivalin/dnsforge"
            version "${VERSION}"
            license "MIT"

            if OS.mac?
              if Hardware::CPU.arm?
                url "https://github.com/rkivalin/dnsforge/releases/download/v${VERSION}/dnsforge-macos-arm64.tar.gz"
                sha256 "${SHA_ARM64}"
              else
                url "https://github.com/rkivalin/dnsforge/releases/download/v${VERSION}/dnsforge-macos-amd64.tar.gz"
                sha256 "${SHA_AMD64}"
              end
            elsif OS.linux?
              if Hardware::CPU.arm?
                url "https://github.com/rkivalin/dnsforge/releases/download/v${VERSION}/dnsforge-linux-arm64.tar.gz"
                sha256 "${SHA_LINUX_ARM64}"
              else
                url "https://github.com/rkivalin/dnsforge/releases/download/v${VERSION}/dnsforge-linux-amd64.tar.gz"
                sha256 "${SHA_LINUX_AMD64}"
              end
            end

            def install
              bin.install "dnsforge"
            end

            test do
              assert_match "Declarative DNS zone manager", shell_output("#{bin}/dnsforge --help")
            end
          end
          FORMULA

          git clone "https://x-access-token:${GH_TOKEN}@github.com/rkivalin/tap.git" tap-repo
          cp dnsforge.rb tap-repo/dnsforge.rb
          cd tap-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dnsforge.rb
          git commit -m "Update dnsforge to ${VERSION}"
          git push
